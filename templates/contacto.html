{% extends "base.html" %}

{% block body_class %}internal{% endblock %}

{% block title %}Contacto | PASI{% endblock %}

{% block content %}

<style>
/* Animación entrada */
body{
  opacity:0;
  transform:translateY(10px);
  transition:opacity 0.5s ease, transform 0.5s ease;
}

body.loaded{
  opacity:1;
  transform:translateY(0);
}

/* FORM */
.section{
  padding:120px 20px;
  text-align:center;
}

.form-container{
  max-width:500px;
  margin:auto;
  background:white;
  padding:40px;
  border-radius:15px;
  box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

.input-group{
  position:relative;
  margin-bottom:25px;
}

input, textarea{
  width:100%;
  padding:12px;
  border:none;
  border-bottom:2px solid #ccc;
  outline:none;
  background:none;
}

label{
  position:absolute;
  left:0;
  top:12px;
  color:#999;
  transition:0.3s;
}

input:focus+label,
input:valid+label,
textarea:focus+label,
textarea:valid+label{
  top:-10px;
  font-size:12px;
  color:#0A2A66;
}

button{
  width:100%;
  padding:14px;
  background:#0A2A66;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.aviso{
  margin-top:15px;
  font-size:0.85rem;
  color:#666;
}

.aviso a{
  color:#0A2A66;
  font-weight:600;
  text-decoration:none;
}

.aviso a:hover{
  text-decoration:underline;
}
</style>

<section class="section">
  <div class="form-container">

    <h2>Contáctanos</h2>

    <form action="https://formspree.io/f/xvzwjevg" method="POST">

      <div class="input-group">
        <input type="text" name="nombre" required>
        <label>Nombre</label>
      </div>

      <div class="input-group">
        <input type="email" name="email" required>
        <label>Correo</label>
      </div>

      <div class="input-group">
        <textarea name="mensaje" required></textarea>
        <label>Mensaje</label>
      </div>

      <button type="submit">Enviar</button>

      <p class="aviso">
        Al enviar este formulario, usted acepta nuestro 
        <a href="/aviso">Aviso de Privacidad</a>
      </p>

    </form>

  </div>
</section>

<script>
/* Animación entrada */
window.addEventListener("load", () => {
  document.body.classList.add("loaded");
});

/* Transición entre páginas */
document.querySelectorAll("a").forEach(link => {
  link.addEventListener("click", function(e){
    if(this.href && this.href.includes(window.location.origin)){
      e.preventDefault();

      document.body.style.opacity = "0.8";
      document.body.style.transform = "translateY(10px)";

      setTimeout(()=>{
        window.location = this.href;
      }, 200);
    }
  });
});
</script>

{% endblock %}
