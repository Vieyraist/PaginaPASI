{% extends "base.html" %}

{% block body_class %}internal{% endblock %}
{% block title %}Servicios | PASI{% endblock %}

{% block content %}

<section class="section">
  <h2>Servicios</h2>

  <div class="services">

    <div class="card" onclick="abrir('pintura')">
      <img src="{{ url_for('static', filename='img/pintura/p1.jpeg') }}">
      <div class="overlay">Pintura Industrial</div>
    </div>

    <div class="card" onclick="abrir('montaje')">
      <img src="{{ url_for('static', filename='img/montaje/m1.jpeg') }}">
      <div class="overlay">Montaje</div>
    </div>

    <div class="card" onclick="abrir('mantenimiento')">
      <img src="{{ url_for('static', filename='img/mantenimiento/mt1.jpeg') }}">
      <div class="overlay">Mantenimiento</div>
    </div>

  </div>

  <!-- SLIDER -->
<div id="slider">
  <span class="close" onclick="cerrar()">✖</span>
  <span class="arrow left" onclick="prev()">❮</span>
  <img id="img">
  <span class="arrow right" onclick="next()">❯</span>
  <div class="counter" id="contador"></div>
</div>

<script>
function generarImagenes(prefijo, carpeta, total){
  let arr = [];
  for(let i=1;i<=total;i++){
    arr.push(`/static/img/${carpeta}/${prefijo}${i}.jpeg`);
  }
  return arr;
}

let data={
  pintura: generarImagenes("p", "pintura", 11),
  montaje: generarImagenes("m", "montaje", 15),
  mantenimiento: generarImagenes("mt", "mantenimiento", 10)
};

let index=0,actual=[];

function abrir(tipo){
  actual=data[tipo];
  index=0;
  mostrar();
  document.getElementById("slider").style.display="flex";
}

function mostrar(){
  let img=document.getElementById("img");
  img.src=actual[index];
  document.getElementById("contador").innerText=(index+1)+" / "+actual.length;
}

function next(){
  index=(index+1)%actual.length;
  mostrar();
}

function prev(){
  index=(index-1+actual.length)%actual.length;
  mostrar();
}

function cerrar(){
  document.getElementById("slider").style.display="none";
}

document.getElementById("slider").onclick=e=>{
  if(e.target.id==="slider") cerrar();
};
</script>
</section>



{% endblock %}
