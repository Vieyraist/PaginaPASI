{% extends "base.html" %}

{% block body_class %}internal{% endblock %}
{% block title %}Proyecto{% endblock %}

{% block content %}

<section class="section">
  <h2>{{ proyecto.nombre }}</h2>
  <p>{{ proyecto.ubicacion }}</p>

  <div class="gallery">
    {% for img in imagenes %}
      <img src="{{ url_for('static', filename='uploads/' + img.filename) }}">
    {% endfor %}
  </div>
</section>

{% endblock %}
